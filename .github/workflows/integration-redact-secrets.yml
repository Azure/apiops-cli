name: "Test: Extract Secret Redaction"

on:
  workflow_dispatch:
    inputs:
      sku:
        description: 'APIM SKU'
        required: true
        type: choice
        options:
          - Standard
          - StandardV2
          - Premium
          - PremiumV2
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'Log level'
        required: false
        type: choice
        options:
          - Info
          - Verbose
          - Debug
        default: Verbose

  workflow_call:
    inputs:
      sku:
        description: 'APIM SKU'
        required: false
        type: string
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'Log level'
        required: false
        type: string
        default: Verbose
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      APIM_PUBLISHER_EMAIL:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-redact-secrets
  cancel-in-progress: false

jobs:
  redact-secrets-test:
    name: Extract Secret Redaction
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: integration-test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci && npm run build

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run redaction integration test
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          ./tests/integration/redact-secrets/run-redact-secrets-test.ps1 `
            -SourceSubscriptionId '${{ secrets.AZURE_SUBSCRIPTION_ID }}' `
            -PublisherEmail '${{ secrets.APIM_PUBLISHER_EMAIL }}' `
            -SkuName '${{ inputs.sku }}' `
            -Location '${{ inputs.location }}' `
            -LogLevel '${{ inputs.log_level }}'
