# ===========================================================================
# Integration Test — Extract→Publish Round-Trip
# ===========================================================================
# Manually triggered workflow that deploys source + target APIM instances,
# extracts from source, publishes to target, and compares the result.
#
# Required secrets (in the 'integration-test' environment):
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (OIDC login)
#   - APIM_PUBLISHER_EMAIL
#
# Required federated credential subject for GitHub OIDC:
#   - Match the subject claim format configured for this repo/org.
#   - Common formats for this workflow:
#       repo:Azure/apiops-cli:environment:integration-test
#       repository_owner_id:<owner_id>:repository_id:<repo_id>:environment:integration-test
#
# Required Azure role assignments for the managed identity (subscription scope):
#   - Contributor
#   - User Access Administrator (required for Microsoft.Authorization/roleAssignments/write)
#   - Key Vault Administrator
#   - API Management Service Contributor
# ===========================================================================

name: "Test: Extract→Publish Round-Trip"

on:
  workflow_dispatch:
    inputs:
      sku:
        description: 'APIM SKU'
        required: true
        type: choice
        options:
          - StandardV2
          - Developer
          - Premium
          - PremiumV2
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'PowerShell log level (Info, Verbose, Debug)'
        required: false
        type: string
        default: Verbose

  workflow_call:
    inputs:
      sku:
        description: 'APIM SKU'
        required: false
        type: string
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'PowerShell log level (Info, Verbose, Debug)'
        required: false
        type: string
        default: Verbose
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      APIM_PUBLISHER_EMAIL:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-test
  cancel-in-progress: false # Don't cancel — would leave resources running

env:
  SOURCE_RG: rg-apiops-bvt-source-${{ github.run_id }}
  TARGET_RG: rg-apiops-bvt-target-${{ github.run_id }}

jobs:
  roundtrip-test:
    name: Extract→Publish Round-Trip
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: integration-test # Requires approval for cost protection

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci && npm run build

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Round-Trip Test
        shell: pwsh
        run: |
          $logLevel = '${{ inputs.log_level }}'
          if ([string]::IsNullOrWhiteSpace($logLevel)) { $logLevel = 'Verbose' }
          if ($logLevel -notin @('Info', 'Verbose', 'Debug')) {
            throw "Invalid log_level '$logLevel'. Allowed values: Info, Verbose, Debug."
          }

          $params = @{
            SourceResourceGroup = '${{ env.SOURCE_RG }}'
            TargetResourceGroup = '${{ env.TARGET_RG }}'
            SkuName            = '${{ inputs.sku }}'
            Location           = '${{ inputs.location }}'
            LogLevel           = $logLevel
            PublisherEmail     = '${{ secrets.APIM_PUBLISHER_EMAIL }}'
            ExtractOutputDir   = './extracted-artifacts'
            HardDelete         = $true
          }

          ./tests/integration/all-resource-types/run-roundtrip-test.ps1 @params

      - name: Upload Extracted Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extracted-artifacts-${{ inputs.sku }}
          path: ./extracted-artifacts/
          if-no-files-found: ignore

      - name: Emergency Teardown
        if: failure()
        shell: pwsh
        run: |
          $sourceRg = '${{ env.SOURCE_RG }}'
          $targetRg = '${{ env.TARGET_RG }}'
          $location = '${{ inputs.location }}'

          # Capture APIM names before RG deletion so we can purge soft-deleted services.
          $sourceApimName = az apim list --resource-group $sourceRg --query "[0].name" -o tsv 2>$null
          $targetApimName = az apim list --resource-group $targetRg --query "[0].name" -o tsv 2>$null

          Write-Host "🚨 Emergency teardown — deleting resource groups..."
          az group delete --name $sourceRg --yes --no-wait 2>$null
          az group delete --name $targetRg --yes --no-wait 2>$null

          Write-Host "⏳ Waiting for resource group deletions before APIM purge..."
          $maxWaitSeconds = 900
          $waited = 0
          $interval = 30

          while ($waited -lt $maxWaitSeconds) {
            $srcExists = (az group exists --name $sourceRg -o tsv 2>$null) -eq 'true'
            $tgtExists = (az group exists --name $targetRg -o tsv 2>$null) -eq 'true'
            if (-not $srcExists -and -not $tgtExists) {
              break
            }
            Start-Sleep -Seconds $interval
            $waited += $interval
          }

          foreach ($apimName in @($sourceApimName, $targetApimName)) {
            if (-not [string]::IsNullOrWhiteSpace($apimName)) {
              Write-Host "🗑️  Purging soft-deleted APIM: $apimName"
              az apim deletedservice purge --service-name $apimName --location $location 2>$null
            }
          }
