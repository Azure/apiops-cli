# ===========================================================================
# Integration Test â€” Extractâ†’Publish Round-Trip
# ===========================================================================
# Manually triggered workflow that deploys source + target APIM instances,
# extracts from source, publishes to target, and compares the result.
#
# Required secrets (in the 'integration-test' environment):
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (OIDC login)
#   - APIM_PUBLISHER_EMAIL
#
# Required federated credential subject for GitHub OIDC:
#   - Match the subject claim format configured for this repo/org.
#   - Common formats for this workflow:
#       repo:Azure/apiops-cli:environment:integration-test
#       repository_owner_id:<owner_id>:repository_id:<repo_id>:environment:integration-test
#
# Required Azure role assignments for the managed identity (subscription scope):
#   - Contributor
#   - User Access Administrator (required for Microsoft.Authorization/roleAssignments/write)
#   - Key Vault Administrator
#   - API Management Service Contributor
# ===========================================================================

name: "Test: Extractâ†’Publish Round-Trip"

on:
  workflow_dispatch:
    inputs:
      sku:
        description: 'APIM SKU'
        required: true
        type: choice
        options:
          - StandardV2
          - Premium
          - PremiumV2
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'PowerShell log level (Info, Verbose, Debug)'
        required: false
        type: string
        default: Verbose

  workflow_call:
    inputs:
      sku:
        description: 'APIM SKU'
        required: false
        type: string
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'PowerShell log level (Info, Verbose, Debug)'
        required: false
        type: string
        default: Verbose
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      APIM_PUBLISHER_EMAIL:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-test
  cancel-in-progress: false # Don't cancel â€” would leave resources running

env:
  SOURCE_RG: rg-apiops-bvt-source-${{ github.run_id }}
  TARGET_RG: rg-apiops-bvt-target-${{ github.run_id }}

jobs:
  roundtrip-test:
    name: Extractâ†’Publish Round-Trip
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: integration-test # Requires approval for cost protection

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci && npm run build

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Round-Trip Phase 1 (Deploy)
        shell: pwsh
        run: |
          $logLevel = '${{ inputs.log_level }}'
          if ([string]::IsNullOrWhiteSpace($logLevel)) { $logLevel = 'Verbose' }
          if ($logLevel -notin @('Info', 'Verbose', 'Debug')) {
            throw "Invalid log_level '$logLevel'. Allowed values: Info, Verbose, Debug."
          }

          $params = @{
            SourceResourceGroup = '${{ env.SOURCE_RG }}'
            TargetResourceGroup = '${{ env.TARGET_RG }}'
            SkuName            = '${{ inputs.sku }}'
            Location           = '${{ inputs.location }}'
            LogLevel           = $logLevel
            PublisherEmail     = '${{ secrets.APIM_PUBLISHER_EMAIL }}'
            StateFile          = './roundtrip-state.json'
          }
          ./tests/integration/all-resource-types/run-roundtrip-phase1-deploy.ps1 @params

      - name: Azure Login (OIDC) - Refresh Before Phase 2
        if: success()
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Round-Trip Phase 2 (Extractâ†’Publishâ†’Verify)
        if: success()
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $logLevel = '${{ inputs.log_level }}'
          if ([string]::IsNullOrWhiteSpace($logLevel)) { $logLevel = 'Verbose' }
          if ($logLevel -notin @('Info', 'Verbose', 'Debug')) {
            throw "Invalid log_level '$logLevel'. Allowed values: Info, Verbose, Debug."
          }

          ./tests/integration/all-resource-types/run-roundtrip-phase2-roundtrip.ps1 `
            -StateFile './roundtrip-state.json' `
            -LogLevel $logLevel `
            -ExtractOutputDir './extracted-artifacts'

      - name: Upload Extracted Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extracted-artifacts-${{ inputs.sku }}
          path: ./extracted-artifacts/
          if-no-files-found: ignore

      - name: Emergency Teardown
        if: failure()
        shell: pwsh
        run: |
          ./tests/integration/all-resource-types/run-roundtrip-phase3-teardown.ps1 `
            -SourceResourceGroup '${{ env.SOURCE_RG }}' `
            -TargetResourceGroup '${{ env.TARGET_RG }}' `
            -Location '${{ inputs.location }}' `
            -HardDelete
