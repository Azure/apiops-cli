# ===========================================================================
# Integration Test — Extract→Publish Round-Trip
# ===========================================================================
# Manually triggered workflow that deploys source + target APIM instances,
# extracts from source, publishes to target, and compares the result.
#
# Required secrets (in the 'integration-test' environment):
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (OIDC login)
#   - APIM_PUBLISHER_EMAIL (optional; defaults to apim-integration-test@contoso.com)
#
# Required federated credential subject for GitHub OIDC:
#   - Match the subject claim format configured for this repo/org.
#   - Common formats for this workflow:
#       repo:Azure/apiops-cli:environment:integration-test
#       repository_owner_id:<owner_id>:repository_id:<repo_id>:environment:integration-test
#
# Required Azure role assignments for the managed identity (subscription scope):
#   - Contributor
#   - User Access Administrator (required for Microsoft.Authorization/roleAssignments/write)
#   - Key Vault Administrator
#   - API Management Service Contributor
# ===========================================================================

name: "Test: Extract→Publish Round-Trip"

on:
  workflow_dispatch:
    inputs:
      sku:
        description: 'APIM SKU'
        required: true
        type: choice
        options:
          - Standard
          - StandardV2
          - Premium
          - PremiumV2
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'Log level'
        required: false
        type: choice
        options:
          - Info
          - Verbose
          - Debug
        default: Verbose

  workflow_call:
    inputs:
      sku:
        description: 'APIM SKU'
        required: false
        type: string
        default: StandardV2
      location:
        description: 'Azure region'
        required: false
        type: string
        default: 'centralus'
      log_level:
        description: 'Log level'
        required: false
        type: string
        default: Verbose

permissions:
  id-token: write
  contents: read

concurrency:
  group: integration-test
  cancel-in-progress: false # Don't cancel — would leave resources running

env:
  DEFAULT_LOCATION: centralus
  DEFAULT_PUBLISHER_EMAIL: apim-integration-test@contoso.com
  SOURCE_RG: rg-apiops-bvt-src-${{ github.run_id }}
  TARGET_RG: rg-apiops-bvt-tgt-${{ github.run_id }}
  SOURCE_APIM: apiops-bvt-src-${{ github.run_id }}
  TARGET_APIM: apiops-bvt-tgt-${{ github.run_id }}

jobs:
  roundtrip-test:
    name: Extract→Publish Round-Trip
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: integration-test # Requires approval for cost protection

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci && npm run build

      - name: Validate Required Secrets
        shell: bash
        run: |
          missing=()
          [[ -z "${{ secrets.AZURE_CLIENT_ID }}" ]] && missing+=("AZURE_CLIENT_ID")
          [[ -z "${{ secrets.AZURE_TENANT_ID }}" ]] && missing+=("AZURE_TENANT_ID")
          [[ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]] && missing+=("AZURE_SUBSCRIPTION_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Azure Region
        shell: bash
        run: |
          LOCATION="${{ inputs.location }}"
          if [[ -z "$LOCATION" ]]; then LOCATION="${{ env.DEFAULT_LOCATION }}"; fi
          VALID_LOCATIONS=$(az account list-locations --query "[].name" -o tsv)
          if ! echo "$VALID_LOCATIONS" | grep -qx "$LOCATION"; then
            echo "::error::Invalid Azure region: '$LOCATION'. Run 'az account list-locations --query [].name' to see valid options."
            exit 1
          fi

      - name: Run Round-Trip Phase 1 (Deploy)
        id: phase1
        shell: pwsh
        run: |
          $params = @{
            SourceResourceGroup = '${{ env.SOURCE_RG }}'
            TargetResourceGroup = '${{ env.TARGET_RG }}'
            SourceApimName     = '${{ env.SOURCE_APIM }}'
            TargetApimName     = '${{ env.TARGET_APIM }}'
            SourceSubscriptionId = '${{ secrets.AZURE_SUBSCRIPTION_ID }}'
            TargetSubscriptionId = '${{ secrets.AZURE_SUBSCRIPTION_ID }}'
            SkuName            = '${{ inputs.sku }}'
            Location           = '${{ inputs.location }}'
            LogLevel           = '${{ inputs.log_level }}'
            PublisherEmail     = '${{ secrets.APIM_PUBLISHER_EMAIL || env.DEFAULT_PUBLISHER_EMAIL }}'
          }
          ./tests/integration/all-resource-types/phases/run-phase1-deploy.ps1 @params

      - name: Azure Login - Refresh Before Phase 2
        if: success()
        uses: azure/login@v3
        with:
          # Phase 1 can run for a long time while APIM activates; refresh login
          # before extract/publish so apiops receives a fresh federated session.
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Round-Trip Phase 2 (Extract)
        id: phase2
        if: success()
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          ./tests/integration/all-resource-types/phases/run-phase2-extract.ps1 `
            -SourceSubscriptionId '${{ steps.phase1.outputs.sourceSubscriptionId }}' `
            -SourceResourceGroup '${{ steps.phase1.outputs.sourceResourceGroup }}' `
            -SourceApimName '${{ steps.phase1.outputs.sourceApimName }}' `
            -LogLevel '${{ inputs.log_level }}' `
            -ExtractOutputDir './extracted-artifacts'

      - name: Run Round-Trip Phase 3 (Validate Extract)
        if: success()
        shell: pwsh
        run: |
          $skuName = '${{ steps.phase1.outputs.skuName }}'
          $extractOutputDir = '${{ steps.phase2.outputs.ExtractOutputDir }}'

          ./tests/integration/all-resource-types/phases/run-phase3-validate-extract.ps1 `
            -SkuName $skuName `
            -LogLevel '${{ inputs.log_level }}' `
            -ExtractOutputDir $extractOutputDir

      - name: Run Round-Trip Phase 4 (Create Overrides)
        id: phase4
        if: success()
        shell: pwsh
        run: |
          $extractOutputDir = '${{ steps.phase2.outputs.ExtractOutputDir }}'

          ./tests/integration/all-resource-types/phases/run-phase4-create-overrides.ps1 `
            -TargetSubscriptionId '${{ steps.phase1.outputs.targetSubscriptionId }}' `
            -TargetResourceGroup '${{ steps.phase1.outputs.targetResourceGroup }}' `
            -LogLevel '${{ inputs.log_level }}' `
            -ExtractOutputDir $extractOutputDir

      - name: Run Round-Trip Phase 5 (Publish)
        if: success()
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $extractOutputDir = '${{ steps.phase2.outputs.ExtractOutputDir }}'

          ./tests/integration/all-resource-types/phases/run-phase5-publish.ps1 `
            -TargetSubscriptionId '${{ steps.phase1.outputs.targetSubscriptionId }}' `
            -TargetResourceGroup '${{ steps.phase1.outputs.targetResourceGroup }}' `
            -TargetApimName '${{ steps.phase1.outputs.targetApimName }}' `
            -OverrideFile '${{ steps.phase4.outputs.overrideFile }}' `
            -LogLevel '${{ inputs.log_level }}' `
            -ExtractOutputDir $extractOutputDir

      - name: Run Round-Trip Phase 6 (Compare)
        if: success()
        shell: pwsh
        run: |
          ./tests/integration/all-resource-types/phases/run-phase6-compare.ps1 `
            -SourceSubscriptionId '${{ steps.phase1.outputs.sourceSubscriptionId }}' `
            -SourceResourceGroup '${{ steps.phase1.outputs.sourceResourceGroup }}' `
            -SourceApimName '${{ steps.phase1.outputs.sourceApimName }}' `
            -TargetSubscriptionId '${{ steps.phase1.outputs.targetSubscriptionId }}' `
            -TargetResourceGroup '${{ steps.phase1.outputs.targetResourceGroup }}' `
            -TargetApimName '${{ steps.phase1.outputs.targetApimName }}' `
            -LogLevel '${{ inputs.log_level }}'

      - name: Run Round-Trip Phase 7 (Teardown)
        if: always()
        shell: pwsh
        run: |
          $sourceResourceGroup = '${{ steps.phase1.outputs.sourceResourceGroup }}'
          if ([string]::IsNullOrWhiteSpace($sourceResourceGroup)) { $sourceResourceGroup = '${{ env.SOURCE_RG }}' }

          $targetResourceGroup = '${{ steps.phase1.outputs.targetResourceGroup }}'
          if ([string]::IsNullOrWhiteSpace($targetResourceGroup)) { $targetResourceGroup = '${{ env.TARGET_RG }}' }

          $location = '${{ steps.phase1.outputs.location }}'
          if ([string]::IsNullOrWhiteSpace($location)) { $location = '${{ inputs.location }}' }

          ./tests/integration/all-resource-types/phases/run-phase7-teardown.ps1 `
            -SourceResourceGroup $sourceResourceGroup `
            -TargetResourceGroup $targetResourceGroup `
            -Location $location
