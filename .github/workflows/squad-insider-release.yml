name: Squad Insider Release

on:
  push:
    branches: [insider]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.js

      - name: Validate custom agent prompt length
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const AGENT_DIR = path.join(process.cwd(), '.github', 'agents');
          const MAX_PROMPT_CHARS = 30000;

          if (!fs.existsSync(AGENT_DIR)) {
            console.log('No .github/agents directory found; skipping prompt-length validation.');
            process.exit(0);
          }

          const agentFiles = fs
            .readdirSync(AGENT_DIR)
            .filter((name) => name.endsWith('.agent.md'))
            .map((name) => path.join(AGENT_DIR, name));

          if (agentFiles.length === 0) {
            console.log('No .agent.md files found; skipping prompt-length validation.');
            process.exit(0);
          }

          let hasError = false;
          for (const filePath of agentFiles) {
            const content = fs.readFileSync(filePath, 'utf8');
            const frontmatter = content.match(/^---\r?\n[\s\S]*?\r?\n---\r?\n?/);
            const prompt = frontmatter ? content.slice(frontmatter[0].length) : content;
            const promptChars = [...prompt].length;

            if (promptChars > MAX_PROMPT_CHARS) {
              hasError = true;
              console.error(`::error file=${path.relative(process.cwd(), filePath)}::Prompt length ${promptChars} exceeds ${MAX_PROMPT_CHARS} characters.`);
            } else {
              console.log(`✓ ${path.relative(process.cwd(), filePath)} prompt length ${promptChars}/${MAX_PROMPT_CHARS}`);
            }
          }

          if (hasError) {
            process.exit(1);
          }
          EOF

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          SHORT_SHA=$(git rev-parse --short HEAD)
          INSIDER_VERSION="${VERSION}-insider+${SHORT_SHA}"
          INSIDER_TAG="v${INSIDER_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "insider_version=$INSIDER_VERSION" >> "$GITHUB_OUTPUT"
          echo "insider_tag=$INSIDER_TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Base Version: $VERSION (Short SHA: $SHORT_SHA)"
          echo "🏷️ Insider Version: $INSIDER_VERSION"
          echo "🔖 Insider Tag: $INSIDER_TAG"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.insider_tag }}" -m "Insider Release ${{ steps.version.outputs.insider_tag }}"
          git push origin "${{ steps.version.outputs.insider_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.insider_tag }}" \
            --title "${{ steps.version.outputs.insider_tag }}" \
            --notes "This is an insider/development build of Squad. Install with:\`\`\`bash\nnpm install -g @bradygaster/squad-cli@${{ steps.version.outputs.insider_tag }}\n\`\`\`\n\n**Note:** Insider builds may be unstable and are intended for early adopters and testing only." \
            --prerelease

      - name: Verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.insider_tag }}"
          echo "✅ Insider Release ${{ steps.version.outputs.insider_tag }} created and verified."
