name: "Test: Build Package"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-package:
    name: Build Package Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx vitest run tests/integration/package-build
