name: Bug Report
description: Report a bug with apiops CLI
labels: ["bug"]
body:
  - type: input
    id: command
    attributes:
      label: Command that triggered the bug
      description: Which CLI command were you running?
      placeholder: "apiops init"
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: npm package version
      description: Which version of apiops are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: "OS, Node.js version, shell, and any other relevant info."
      placeholder: |
        - OS: Windows 11
        - Node.js: 20.11.0
        - Shell: PowerShell 7.4
    validations:
      required: true

  - type: dropdown
    id: blocking
    attributes:
      label: Is this bug blocking you?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
